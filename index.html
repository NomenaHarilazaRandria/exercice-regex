<!DOCTYPE html>
<html lang="fr">
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<link rel="stylesheet" href="style.css">
		<title>Exercice REGEX</title>
	</head>
	<body>
		<div id="container">
			<div id="containerInputBtn">
				<input type="text" id="phrase" placeholder="Entrer votre text">
				<div id="erreurMsg">Ajouter un text pour voir le résultat !</div>
				<div id="containerBtn1">
					<button id="btn1" type="button">Remplace <span style="color: green; font-weight: bold">/[aeiouy]/gi</span> par *</button>
					<p id="pBtn1"></p>
				</div>
				<div id="containerBtn2">
					<button id="btn2" type="button">Remplace <span style="color: green; font-weight: bold">/[0-9]/g</span> par X</button>
					<p id="pBtn2"></p>
				</div>
				<div id="containerBtn3">
					<button id="btn3" type="button">Remplace <span style="color: green; font-weight: bold">/[a-z]/g</span> par -</button>
					<p id="pBtn3"></p>
				</div>
				<div id="containerBtn4">
					<button id="btn4" type="button">Remplace <span style="color: green; font-weight: bold">/\s/g</span> par _</button>
					<p id="pBtn4"></p>
				</div>
				<div id="containerBtn5">
					<button id="btn5" type="button">Colorer en rouge le résultat de <span style="color: green; font-weight: bold">/[abc123XYZ]/</span></button>
					<p id="pBtn5"></p>
				</div>
				<div id="containerBtn6">
					<button id="btn6" type="button">Colorer en rouge le résultat de <span style="color: green; font-weight: bold">/[abc123XYZ]/g</span></button>
					<p id="pBtn6"></p>
				</div>
				<div id="containerBtn7">
					<button id="btn7" type="button">HideNumber dans un code</button>
					<p id="pBtn7"></p>
				</div>
			</div>
			<div id="explication">
				Les explications sur chaque regex seront générées ici.
			</div>
		</div>
		<script src="script.js"></script>
	</body>
</html>
